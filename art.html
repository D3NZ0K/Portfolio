  <style>
    .page-hero { padding: calc(var(--nav-h) + 80px) 40px 64px; border-bottom: 1px solid var(--border); }
    .page-hero .eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .page-hero h1 { font-family: var(--font-display); font-size: clamp(2.8rem, 6vw, 5.5rem); font-weight: 600; line-height: 1.05; }
    .page-hero p { color: var(--muted); max-width: 480px; margin-top: 20px; font-size: 0.95rem; line-height: 1.7; }
    .art-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 2px; padding: 2px 40px 0; }
    .art-card:first-child { grid-row: span 2; }
    .art-card:first-child .media-wrap { aspect-ratio: unset; height: 100%; min-height: 400px; }
    .art-grid-right { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; }
    .art-card { position: relative; overflow: hidden; display: block; cursor: pointer; }
    .art-card .media-wrap { aspect-ratio: 4/3; }
    .art-card .slideshow { position: absolute; inset: 0; width: 100%; height: 100%; }
    .art-card .slide { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.6s ease; }
    .art-card .slide.active { opacity: 1; }
    .art-card .slide img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.6) saturate(0.7); transition: filter 0.4s; }
    .art-card:hover .slide img { filter: brightness(0.4) saturate(0.5); }
    .art-card-info { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 28px; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, transparent 100%); z-index: 2; }
    .art-card-num { font-family: var(--font-display); font-size: 0.7rem; color: rgba(255,255,255,0.22); letter-spacing: 0.08em; margin-bottom: 8px; }
    .art-card-title { font-family: var(--font-display); font-size: 1.7rem; font-weight: 600; line-height: 1.1; }
    .art-card:first-child .art-card-title { font-size: clamp(2rem, 3vw, 2.8rem); }
    .slide-dots { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 3; opacity: 0; transition: opacity 0.3s; }
    .art-card:hover .slide-dots { opacity: 1; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: background 0.3s; }
    .dot.active { background: var(--accent); }
    @media (max-width: 900px) {
      .art-grid { grid-template-columns: 1fr; padding: 2px 20px 0; }
      .art-card:first-child { grid-row: auto; }
      .art-card:first-child .media-wrap { aspect-ratio: 4/3; min-height: unset; height: auto; }
      .art-grid-right { grid-template-columns: 1fr; }
      .page-hero { padding: calc(var(--nav-h) + 40px) 20px 40px; }
    }
  </style>

<script>
  document.querySelectorAll('.art-card').forEach(card => {
    const slides = card.querySelectorAll('.slide');
    const dots = card.querySelectorAll('.dot');
    let interval = null;
    let current = 0;

    function goTo(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = index % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    card.addEventListener('mouseenter', () => {
      interval = setInterval(() => { goTo(current + 1); }, 800);
    });

    card.addEventListener('mouseleave', () => {
      clearInterval(interval);
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = 0;
      slides[0].classList.add('active');
      dots[0].classList.add('active');
    });
  });
</script>
